name: Revision History Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Require parent revision updates for specialist pointer changes
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            echo "No comparable base SHA; skipping diff-based policy check."
            exit 0
          fi

          changed="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          echo "${changed}"

          if echo "${changed}" | grep -qE '^specialists/'; then
            if ! echo "${changed}" | grep -q '^REVISION_HISTORY.md$'; then
              echo "ERROR: specialist pointer/content changed without REVISION_HISTORY.md update."
              exit 1
            fi
          fi

      - name: Ensure each specialist submodule has revision history
        run: |
          set -euo pipefail
          git submodule foreach --recursive '
            if [ ! -f REVISION_HISTORY.md ]; then
              echo "ERROR: missing REVISION_HISTORY.md in $name"
              exit 1
            fi
          '
